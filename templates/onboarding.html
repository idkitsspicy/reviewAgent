<!DOCTYPE html>
<html>
<head>
    <title>Connect Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">
    <h1 class="text-2xl font-bold mb-6 text-center">Connect Your Business</h1>

    <form method="post" action="/onboarding">

        <input
            type="text"
            name="business_name"
            placeholder="Business Name"
            required
            class="w-full border rounded-xl p-3 mb-4"
        />

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
            class="w-full border rounded-xl p-3 mb-4"
        />

        <input
            type="text"
            name="profile_id"
            placeholder="Business Profile ID"
            required
            class="w-full border rounded-xl p-3 mb-4"
        />

        <select
            name="automation_mode"
            class="w-full border rounded-xl p-3 mb-6"
        >
            <option value="approval">Approval Mode</option>
            <option value="smart_auto">Smart Auto Mode</option>
        </select>

        <button class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
            Connect Business
        </button>

    </form>
</div>

</body>
</html>
