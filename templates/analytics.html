<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">

<h1 class="text-3xl font-bold mb-8">Analytics Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="text-gray-500">Total Reviews</h2>
        <p class="text-3xl font-bold mt-2">{{ total_reviews }}</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="text-gray-500">Positive Reviews</h2>
        <p class="text-3xl font-bold mt-2 text-green-600">{{ positive_count }}</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="text-gray-500">Negative Reviews</h2>
        <p class="text-3xl font-bold mt-2 text-red-600">{{ negative_count }}</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="text-gray-500">Average Rating</h2>
        <p class="text-3xl font-bold mt-2">{{ average_rating }} / 5</p>
    </div>

</div>

<div class="mt-8 bg-white p-6 rounded-2xl shadow">
    <h2 class="text-gray-500">Most Common Complaint Intent</h2>
    <p class="text-2xl font-semibold mt-2">
        {{ most_common_intent }}
    </p>
</div>

<div class="mt-8">
    <a href="/" class="text-blue-600 hover:underline">
        ← Back to Dashboard
    </a>
</div>

</body>
</html>
