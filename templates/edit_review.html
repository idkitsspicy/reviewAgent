<!DOCTYPE html>
<html>
<head>
    <title>Edit Reply</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow">
    <h1 class="text-2xl font-bold mb-6">Edit AI Reply</h1>

    <p class="mb-4 text-gray-700">
        <strong>Customer Review:</strong> {{ review.text }}
    </p>

    <form method="post">
        <textarea
            name="edited_response"
            class="w-full border rounded-xl p-4 h-40"
        >{{ review.response }}</textarea>

        <button class="mt-4 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700">
            Save Changes
        </button>
    </form>

</div>

</body>
</html>
